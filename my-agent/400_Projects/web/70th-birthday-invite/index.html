<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#130404" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>黃鎮岳先生 八十大壽 壽宴邀請</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --deep:       #130404;
      --red:        #3D0A0A;
      --gold:       #D4AF37;
      --gold-dim:   rgba(212,175,55,.32);
      --gold-faint: rgba(212,175,55,.12);
      --cream:      #F5E6A3;
    }

    html, body {
      height: 100%; overflow: hidden;
      font-family: 'Noto Serif TC', serif;
      background: var(--deep);
      color: var(--cream);
    }

    #scroll-wrap {
      position: fixed; inset: 0;
      will-change: transform;
    }

    #canvas {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 50;
    }

    /* nav dots */
    .dots {
      position: fixed; right: 14px; top: 50%;
      transform: translateY(-50%);
      z-index: 200;
      display: flex; flex-direction: column; gap: 14px;
    }
    .dot {
      width: 5px; height: 5px; border-radius: 50%;
      border: 1px solid var(--gold);
      background: transparent;
      cursor: pointer;
      transition: all .3s;
      touch-action: manipulation;
    }
    .dot.on { background: var(--gold); box-shadow: 0 0 6px var(--gold); }

    section {
      height: 100vh; height: 100svh;
      position: relative;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }

    /* gold double frame */
    .frame {
      position: absolute; inset: 12px;
      border: 1px solid var(--gold-dim);
      pointer-events: none; z-index: 5;
    }
    .frame::before {
      content: '';
      position: absolute; inset: 5px;
      border: 1px solid var(--gold-faint);
    }
    .frame .fc {
      position: absolute;
      width: 18px; height: 18px;
      color: var(--gold);
      font-size: 11px;
      line-height: 1;
      text-shadow: 0 0 8px rgba(212,175,55,.7);
    }
    .frame .fc.tl { top: -7px; left: -7px; }
    .frame .fc.tr { top: -7px; right: -7px; }
    .frame .fc.bl { bottom: -7px; left: -7px; }
    .frame .fc.br { bottom: -7px; right: -7px; }

    .deco { position: absolute; pointer-events: none; z-index: 4; }

    /* divider */
    .hr {
      display: flex; align-items: center; justify-content: center;
      gap: 10px; margin: 10px 0;
    }
    .hr::before, .hr::after {
      content: ''; height: 1px; width: 52px;
      background: linear-gradient(to right, transparent, var(--gold), transparent);
    }
    .hr span { color: var(--gold); font-size: 8px; }

    /* ═══ PAGE 1 ═══ */
    #p1 { background: radial-gradient(ellipse at 50% 38%, #3D0A0A 0%, #1E0505 55%, var(--deep) 100%); }

    .couplet {
      position: absolute; top: 26px; left: 50%;
      transform: translateX(-50%);
      z-index: 10; white-space: nowrap;
      animation: fadeUp 1.2s ease .2s both;
    }
    .couplet-text {
      font-size: 3.4vw;
      color: var(--gold); letter-spacing: .35em; font-weight: 300;
      opacity: .85; text-shadow: 0 0 12px rgba(212,175,55,.4);
    }
    .couplet-sep {
      display: inline-block;
      width: 1px; height: 10px;
      background: var(--gold-dim); margin: 0 10px;
      vertical-align: middle;
    }

    .p1-body { text-align: center; z-index: 10; padding: 0 20px; margin-top: 8px; }

    .shou {
      font-size: 36vw; color: var(--gold); line-height: 1;
      animation: glow 3s ease-in-out infinite, fadeUp 1.2s ease .1s both;
      text-shadow: 0 0 40px rgba(212,175,55,.9), 0 0 80px rgba(212,175,55,.4);
    }
    .p1-name {
      font-size: 5vw; letter-spacing: .15em; font-weight: 500;
      animation: fadeUp 1.2s ease .5s both;
    }
    .p1-title {
      font-size: 9.5vw; color: var(--gold); letter-spacing: .22em; font-weight: 700;
      text-shadow: 0 2px 12px rgba(212,175,55,.5);
      animation: fadeUp 1.2s ease .8s both;
    }
    .p1-date {
      font-size: 3.2vw; color: rgba(245,230,163,.6); letter-spacing: .08em;
      animation: fadeUp 1.2s ease 1.1s both; margin-top: 4px;
    }

    .scroll-hint {
      position: absolute; bottom: 22px; left: 50%;
      transform: translateX(-50%);
      color: rgba(212,175,55,.45); font-size: 10px; letter-spacing: .15em;
      white-space: nowrap; animation: bob 2.2s ease-in-out infinite; z-index: 10;
    }
    .scroll-hint::after {
      content: ''; display: block;
      width: 1px; height: 20px; margin: 6px auto 0;
      background: linear-gradient(to bottom, rgba(212,175,55,.45), transparent);
    }

    /* ═══ PAGE 2 ═══ */
    #p2 { background: linear-gradient(140deg, #1A0505 0%, #2C0707 50%, #1A0505 100%); }

    .p2-body { z-index: 10; text-align: center; width: 88%; max-width: 480px; }

    .sec-title {
      font-size: 4.5vw; color: var(--gold); letter-spacing: .3em; margin-bottom: 18px;
    }
    .sec-title::before, .sec-title::after { content: '❖ '; font-size: 10px; opacity: .65; }

    .card {
      border: 1px solid var(--gold-dim); padding: 24px 20px; position: relative;
    }
    .card::before {
      content: ''; position: absolute; inset: 6px;
      border: 1px solid rgba(212,175,55,.1); pointer-events: none;
    }

    .intro-txt {
      font-size: 3.8vw; color: rgba(245,230,163,.75);
      letter-spacing: .1em; line-height: 2; margin-bottom: 20px;
    }

    .row { display: flex; gap: 12px; align-items: flex-start; margin: 14px 0; text-align: left; }
    .row-icon {
      width: 20px; min-width: 20px; margin-top: 3px; display: flex; align-items: center; justify-content: center;
    }
    .lbl { font-size: 10px; color: rgba(212,175,55,.6); letter-spacing: .2em; margin-bottom: 3px; }
    .val { font-size: 3.8vw; color: var(--cream); letter-spacing: .06em; font-weight: 500; line-height: 1.5; }

    /* ═══ PAGE 3 ═══ */
    #p3 { background: radial-gradient(ellipse at 50% 60%, #2C0707 0%, #180404 55%, var(--deep) 100%); }

    .p3-body { z-index: 10; text-align: center; width: 88%; max-width: 420px; }

    .p3-main {
      font-size: 10vw; color: var(--gold); letter-spacing: .3em; font-weight: 700;
      text-shadow: 0 0 22px rgba(212,175,55,.5); margin-bottom: 12px;
    }
    .p3-sub {
      font-size: 3.8vw; color: rgba(245,230,163,.72);
      letter-spacing: .12em; line-height: 2.1; margin-bottom: 28px;
    }

    .contact { margin: 0 auto 24px; }
    .contact-lbl { font-size: 10px; color: rgba(212,175,55,.6); letter-spacing: .3em; margin-bottom: 8px; }
    .contact-num {
      display: block; font-size: 7.5vw;
      color: var(--gold); letter-spacing: .15em; font-weight: 700;
      text-decoration: none; transition: opacity .2s;
    }
    .contact-num:active { opacity: .65; }
    .contact-line {
      height: 1px; margin-top: 8px;
      background: linear-gradient(to right, transparent, rgba(212,175,55,.35), transparent);
    }

    .sig { border-top: 1px solid rgba(212,175,55,.18); padding-top: 20px; margin-top: 4px; }
    .sig-lbl { font-size: 10px; color: rgba(212,175,55,.55); letter-spacing: .3em; margin-bottom: 8px; }
    .sig-names { font-size: 4.8vw; letter-spacing: .25em; font-weight: 500; }

    /* reveal */
    .rev { opacity: 0; transform: translateY(18px); transition: opacity .85s ease, transform .85s ease; }
    .rev.on { opacity: 1; transform: none; }
    .rev.d1 { transition-delay: .12s; }
    .rev.d2 { transition-delay: .28s; }
    .rev.d3 { transition-delay: .46s; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: none; }
    }
    @keyframes glow {
      0%,100% { text-shadow: 0 0 40px rgba(212,175,55,.9), 0 0 80px rgba(212,175,55,.4); }
      50%      { text-shadow: 0 0 65px #D4AF37, 0 0 130px rgba(212,175,55,.55); }
    }
    @keyframes bob {
      0%,100% { transform: translateX(-50%) translateY(0); }
      50%      { transform: translateX(-50%) translateY(-6px); }
    }
    @keyframes lanternSway {
      0%,100% { transform: rotate(-4deg) translateX(0); }
      50%      { transform: rotate(4deg) translateX(0); }
    }

    @media (min-width: 768px) {
      .shou         { font-size: 180px; }
      .p1-name      { font-size: 28px; letter-spacing: .3em; }
      .p1-title     { font-size: 50px; letter-spacing: .4em; }
      .p1-date      { font-size: 16px; letter-spacing: .15em; }
      .couplet-text { font-size: 16px; }
      .sec-title    { font-size: 20px; letter-spacing: .4em; }
      .intro-txt    { font-size: 15px; letter-spacing: .14em; }
      .val          { font-size: 16px; letter-spacing: .08em; }
      .p3-main      { font-size: 44px; letter-spacing: .45em; }
      .p3-sub       { font-size: 15px; letter-spacing: .18em; }
      .contact-num  { font-size: 28px; }
      .sig-names    { font-size: 19px; letter-spacing: .3em; }
      .card         { padding: 32px 38px; }
    }
  </style>
</head>
<body>

<canvas id="canvas"></canvas>

<nav class="dots">
  <div class="dot on" onclick="go(0)"></div>
  <div class="dot"    onclick="go(1)"></div>
  <div class="dot"    onclick="go(2)"></div>
</nav>

<div id="scroll-wrap">

<!-- ══════ PAGE 1 ══════ -->
<section id="p1">
  <div class="frame">
    <span class="fc tl">◈</span><span class="fc tr">◈</span>
    <span class="fc bl">◈</span><span class="fc br">◈</span>
  </div>

  <!-- 燈籠 左 -->
  <svg class="deco" style="top:0;left:3vw;width:16vw;max-width:68px;transform-origin:top center;animation:lanternSway 4s ease-in-out infinite;" viewBox="0 0 68 140" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="lbody1" cx="38%" cy="35%" r="65%">
        <stop offset="0%" stop-color="#FF8C5A" stop-opacity=".55"/>
        <stop offset="100%" stop-color="#7A0000" stop-opacity="0"/>
      </radialGradient>
      <filter id="lglow1">
        <feGaussianBlur stdDeviation="3" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>
    <!-- 掛線 -->
    <line x1="34" y1="0" x2="34" y2="14" stroke="#C8A830" stroke-width="1.2" opacity=".8"/>
    <!-- 頂環 -->
    <rect x="20" y="14" width="28" height="6" rx="3" fill="#C8A830" opacity=".9"/>
    <rect x="24" y="14" width="20" height="3" rx="1.5" fill="#E8C840" opacity=".6"/>
    <!-- 燈籠主體 -->
    <ellipse cx="34" cy="66" rx="26" ry="42" fill="#8B0000" opacity=".95"/>
    <ellipse cx="34" cy="66" rx="26" ry="42" fill="url(#lbody1)"/>
    <!-- 金色橫紋 -->
    <ellipse cx="34" cy="38" rx="24" ry="3" fill="none" stroke="#C8A830" stroke-width="1" opacity=".5"/>
    <ellipse cx="34" cy="52" rx="26" ry="3" fill="none" stroke="#C8A830" stroke-width="1" opacity=".5"/>
    <ellipse cx="34" cy="66" rx="26" ry="3" fill="none" stroke="#C8A830" stroke-width="1.2" opacity=".55"/>
    <ellipse cx="34" cy="80" rx="26" ry="3" fill="none" stroke="#C8A830" stroke-width="1" opacity=".5"/>
    <ellipse cx="34" cy="94" rx="24" ry="3" fill="none" stroke="#C8A830" stroke-width="1" opacity=".5"/>
    <!-- 壽字 -->
    <text x="34" y="74" text-anchor="middle" font-size="24" fill="#D4AF37" font-family="Noto Serif TC, serif" font-weight="700" opacity=".95" filter="url(#lglow1)">壽</text>
    <!-- 底環 -->
    <rect x="20" y="106" width="28" height="6" rx="3" fill="#C8A830" opacity=".9"/>
    <rect x="24" y="109" width="20" height="3" rx="1.5" fill="#E8C840" opacity=".5"/>
    <!-- 流蘇軸 -->
    <line x1="34" y1="112" x2="34" y2="122" stroke="#C8A830" stroke-width="1.5" opacity=".7"/>
    <!-- 流蘇絲 -->
    <line x1="28" y1="120" x2="25" y2="140" stroke="#C8A830" stroke-width=".9" opacity=".55"/>
    <line x1="31" y1="121" x2="29" y2="140" stroke="#C8A830" stroke-width=".9" opacity=".55"/>
    <line x1="34" y1="122" x2="34" y2="140" stroke="#C8A830" stroke-width=".9" opacity=".6"/>
    <line x1="37" y1="121" x2="39" y2="140" stroke="#C8A830" stroke-width=".9" opacity=".55"/>
    <line x1="40" y1="120" x2="43" y2="140" stroke="#C8A830" stroke-width=".9" opacity=".55"/>
  </svg>

  <!-- 梅花枝 左下 -->
  <svg class="deco" style="bottom:0;left:0;width:48vw;max-width:185px;opacity:.82" viewBox="0 0 185 185" fill="none">
    <defs>
      <filter id="pf1"><feGaussianBlur stdDeviation="1" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    </defs>
    <!-- 主幹 -->
    <path d="M5 180 C20 155 45 130 68 105 C88 84 110 68 135 52" stroke="#6B2A2A" stroke-width="3" stroke-linecap="round" fill="none"/>
    <!-- 側枝 -->
    <path d="M68 105 C58 88 50 72 46 56" stroke="#6B2A2A" stroke-width="2" stroke-linecap="round" fill="none"/>
    <path d="M95 82 C88 68 84 55 82 42" stroke="#6B2A2A" stroke-width="1.8" stroke-linecap="round" fill="none"/>
    <path d="M115 66 C120 55 122 44 120 32" stroke="#6B2A2A" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    <!-- 花：5瓣用 path -->
    <!-- 大花 @ 135,52 -->
    <g transform="translate(135,52)" filter="url(#pf1)">
      <path d="M0,-13 C4,-13 9,-8 9,0 C9,8 4,13 0,13 C-4,13 -9,8 -9,0 C-9,-8 -4,-13 0,-13 Z" fill="#C8687A" opacity=".9" transform="rotate(0)"/>
      <path d="M0,-13 C4,-13 9,-8 9,0 C9,8 4,13 0,13 C-4,13 -9,8 -9,0 C-9,-8 -4,-13 0,-13 Z" fill="#C8687A" opacity=".9" transform="rotate(72)"/>
      <path d="M0,-13 C4,-13 9,-8 9,0 C9,8 4,13 0,13 C-4,13 -9,8 -9,0 C-9,-8 -4,-13 0,-13 Z" fill="#D4849A" opacity=".85" transform="rotate(144)"/>
      <path d="M0,-13 C4,-13 9,-8 9,0 C9,8 4,13 0,13 C-4,13 -9,8 -9,0 C-9,-8 -4,-13 0,-13 Z" fill="#D4849A" opacity=".85" transform="rotate(216)"/>
      <path d="M0,-13 C4,-13 9,-8 9,0 C9,8 4,13 0,13 C-4,13 -9,8 -9,0 C-9,-8 -4,-13 0,-13 Z" fill="#C8687A" opacity=".9" transform="rotate(288)"/>
      <circle cx="0" cy="0" r="4" fill="#D4AF37"/>
      <!-- 花蕊點 -->
      <circle cx="0" cy="-6" r="1" fill="#FFF0A0" opacity=".8"/>
      <circle cx="5.7" cy="-1.9" r="1" fill="#FFF0A0" opacity=".8"/>
      <circle cx="3.5" cy="4.8" r="1" fill="#FFF0A0" opacity=".8"/>
      <circle cx="-3.5" cy="4.8" r="1" fill="#FFF0A0" opacity=".8"/>
      <circle cx="-5.7" cy="-1.9" r="1" fill="#FFF0A0" opacity=".8"/>
    </g>
    <!-- 中花 @ 46,56 -->
    <g transform="translate(46,56)" filter="url(#pf1)">
      <path d="M0,-10 C3,-10 7,-6 7,0 C7,6 3,10 0,10 C-3,10 -7,6 -7,0 C-7,-6 -3,-10 0,-10 Z" fill="#E8909A" opacity=".9" transform="rotate(18)"/>
      <path d="M0,-10 C3,-10 7,-6 7,0 C7,6 3,10 0,10 C-3,10 -7,6 -7,0 C-7,-6 -3,-10 0,-10 Z" fill="#E8909A" opacity=".9" transform="rotate(90)"/>
      <path d="M0,-10 C3,-10 7,-6 7,0 C7,6 3,10 0,10 C-3,10 -7,6 -7,0 C-7,-6 -3,-10 0,-10 Z" fill="#F2B8C2" opacity=".85" transform="rotate(162)"/>
      <path d="M0,-10 C3,-10 7,-6 7,0 C7,6 3,10 0,10 C-3,10 -7,6 -7,0 C-7,-6 -3,-10 0,-10 Z" fill="#F2B8C2" opacity=".85" transform="rotate(234)"/>
      <path d="M0,-10 C3,-10 7,-6 7,0 C7,6 3,10 0,10 C-3,10 -7,6 -7,0 C-7,-6 -3,-10 0,-10 Z" fill="#E8909A" opacity=".9" transform="rotate(306)"/>
      <circle cx="0" cy="0" r="3.5" fill="#D4AF37"/>
    </g>
    <!-- 小花 @ 82,42 -->
    <g transform="translate(82,42)" filter="url(#pf1)">
      <path d="M0,-8 C2.5,-8 5.5,-5 5.5,0 C5.5,5 2.5,8 0,8 C-2.5,8 -5.5,5 -5.5,0 C-5.5,-5 -2.5,-8 0,-8 Z" fill="#F2B8C2" opacity=".9" transform="rotate(0)"/>
      <path d="M0,-8 C2.5,-8 5.5,-5 5.5,0 C5.5,5 2.5,8 0,8 C-2.5,8 -5.5,5 -5.5,0 C-5.5,-5 -2.5,-8 0,-8 Z" fill="#F2B8C2" opacity=".9" transform="rotate(72)"/>
      <path d="M0,-8 C2.5,-8 5.5,-5 5.5,0 C5.5,5 2.5,8 0,8 C-2.5,8 -5.5,5 -5.5,0 C-5.5,-5 -2.5,-8 0,-8 Z" fill="#E8909A" opacity=".85" transform="rotate(144)"/>
      <path d="M0,-8 C2.5,-8 5.5,-5 5.5,0 C5.5,5 2.5,8 0,8 C-2.5,8 -5.5,5 -5.5,0 C-5.5,-5 -2.5,-8 0,-8 Z" fill="#E8909A" opacity=".85" transform="rotate(216)"/>
      <path d="M0,-8 C2.5,-8 5.5,-5 5.5,0 C5.5,5 2.5,8 0,8 C-2.5,8 -5.5,5 -5.5,0 C-5.5,-5 -2.5,-8 0,-8 Z" fill="#F2B8C2" opacity=".9" transform="rotate(288)"/>
      <circle cx="0" cy="0" r="2.8" fill="#D4AF37"/>
    </g>
    <!-- 花苞 -->
    <ellipse cx="120" cy="32" rx="4" ry="6.5" fill="#C8687A" opacity=".7" transform="rotate(-20 120 32)"/>
    <ellipse cx="100" cy="74" rx="3" ry="5" fill="#E8909A" opacity=".65" transform="rotate(10 100 74)"/>
    <!-- 葉 -->
    <path d="M55 90 Q62 82 70 86" stroke="#4A6B3A" stroke-width="1.5" fill="none" opacity=".6"/>
    <path d="M80 75 Q88 68 94 73" stroke="#4A6B3A" stroke-width="1.3" fill="none" opacity=".5"/>
  </svg>

  <!-- 梅花枝 右上 -->
  <svg class="deco" style="top:55px;right:0;width:40vw;max-width:155px;opacity:.75;transform:scaleX(-1)" viewBox="0 0 155 155" fill="none">
    <path d="M5 5 C25 30 55 60 80 85 C100 105 120 118 148 130" stroke="#6B2A2A" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <path d="M80 85 C70 70 65 55 62 40" stroke="#6B2A2A" stroke-width="1.8" stroke-linecap="round" fill="none"/>
    <path d="M105 102 C112 88 115 74 113 60" stroke="#6B2A2A" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    <!-- 主花 @ 62,40 -->
    <g transform="translate(62,40)">
      <path d="M0,-11 C3.5,-11 8,-7 8,0 C8,7 3.5,11 0,11 C-3.5,11 -8,7 -8,0 C-8,-7 -3.5,-11 0,-11 Z" fill="#C8687A" opacity=".9" transform="rotate(10)"/>
      <path d="M0,-11 C3.5,-11 8,-7 8,0 C8,7 3.5,11 0,11 C-3.5,11 -8,7 -8,0 C-8,-7 -3.5,-11 0,-11 Z" fill="#C8687A" opacity=".9" transform="rotate(82)"/>
      <path d="M0,-11 C3.5,-11 8,-7 8,0 C8,7 3.5,11 0,11 C-3.5,11 -8,7 -8,0 C-8,-7 -3.5,-11 0,-11 Z" fill="#D4849A" opacity=".85" transform="rotate(154)"/>
      <path d="M0,-11 C3.5,-11 8,-7 8,0 C8,7 3.5,11 0,11 C-3.5,11 -8,7 -8,0 C-8,-7 -3.5,-11 0,-11 Z" fill="#D4849A" opacity=".85" transform="rotate(226)"/>
      <path d="M0,-11 C3.5,-11 8,-7 8,0 C8,7 3.5,11 0,11 C-3.5,11 -8,7 -8,0 C-8,-7 -3.5,-11 0,-11 Z" fill="#C8687A" opacity=".9" transform="rotate(298)"/>
      <circle cx="0" cy="0" r="3.5" fill="#D4AF37"/>
    </g>
    <!-- 小花 @ 113,60 -->
    <g transform="translate(113,60)">
      <path d="M0,-8 C2.5,-8 5.5,-5 5.5,0 C5.5,5 2.5,8 0,8 C-2.5,8 -5.5,5 -5.5,0 C-5.5,-5 -2.5,-8 0,-8 Z" fill="#F2B8C2" opacity=".85" transform="rotate(0)"/>

    x:   Math.random() * innerWidth,
    y:   spread ? Math.random() * innerHeight : -15,
    sz:  Math.random() * 5 + 2.5,
    vx:  (Math.random() - .5) * 1.0,
    vy:  Math.random() * 1.1 + .4,
    rot: Math.random() * Math.PI * 2,
    dr:  (Math.random() - .5) * .04,
    a:   Math.random() * .45 + .15,
    sw:  Math.random() * .022,
    swO: Math.random() * Math.PI * 2,
    col: gold
      ? `rgba(212,175,55,${(Math.random()*.35+.18).toFixed(2)})`
      : ['#C8687A','#E8909A','#F2B8C2','#A84060'][Math.floor(Math.random()*4)]
  };
}

function drawP(p) {
  ctx.save();
  ctx.globalAlpha = p.a;
  ctx.translate(p.x, p.y);
  ctx.rotate(p.rot);
  ctx.beginPath();
  ctx.moveTo(0, -p.sz);
  ctx.bezierCurveTo( p.sz*.75, -p.sz*.4,  p.sz*.75,  p.sz*.4, 0,  p.sz);
  ctx.bezierCurveTo(-p.sz*.75,  p.sz*.4, -p.sz*.75, -p.sz*.4, 0, -p.sz);
  ctx.fillStyle = p.col;
  ctx.fill();
  ctx.restore();
}

let t = 0;
function loop() {
  ctx.clearRect(0, 0, cv.width, cv.height);
  t += .012;
  P.forEach((p, i) => {
    p.x   += p.vx + Math.sin(t + p.swO) * p.sw * 26;
    p.y   += p.vy;
    p.rot += p.dr;
    if (p.y > innerHeight + 20) P[i] = makePetal(false);
    drawP(p);
  });
  requestAnimationFrame(loop);
}
loop();

const secs = document.querySelectorAll('section');
const dots = document.querySelectorAll('.dot');

const wrap = document.getElementById('scroll-wrap');
let cur = 0;
let busy = false;

function ease(t) {
  return t < .5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2;
}

function goTo(idx, dur = 1000) {
  if (busy || idx < 0 || idx >= secs.length || idx === cur) return;
  busy = true;
  const from = cur * innerHeight;
  const to   = idx * innerHeight;
  const diff = to - from;
  const t0   = performance.now();

  function tick(now) {
    const p = Math.min((now - t0) / dur, 1);
    wrap.style.transform = `translateY(${-(from + diff * ease(p))}px)`;
    if (p < 1) { requestAnimationFrame(tick); return; }
    cur = idx;
    busy = false;
    updateUI();
  }
  requestAnimationFrame(tick);
}

function updateUI() {
  dots.forEach((d,i) => d.classList.toggle('on', i === cur));
  secs[cur].querySelectorAll('.rev').forEach(el => el.classList.add('on'));
}

// 初始化：用 transform 代替 scroll
wrap.style.willChange = 'transform';
wrap.style.transform  = 'translateY(0)';
updateUI();

// touch
let ty0 = 0, tt0 = 0;
wrap.addEventListener('touchstart', e => { ty0 = e.touches[0].clientY; tt0 = Date.now(); }, { passive: true });
wrap.addEventListener('touchend',   e => {
  if (busy) return;
  const dy = ty0 - e.changedTouches[0].clientY;
  const dt = Date.now() - tt0;
  if (Math.abs(dy) > 35 || (Math.abs(dy) > 15 && dt < 250))
    goTo(dy > 0 ? cur + 1 : cur - 1);
}, { passive: true });

// wheel
let wt = 0;
wrap.addEventListener('wheel', e => {
  e.preventDefault();
  const now = Date.now();
  if (now - wt < 200) return;
  wt = now;
  goTo(e.deltaY > 0 ? cur + 1 : cur - 1);
}, { passive: false });

function go(i) { goTo(i); }
</script>
